<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="../../assets/other/favicon-genart.png" type="image/png">
    <link rel="stylesheet" href="../../assets/stylesheets/index.css">
    <link rel="stylesheet" href="../../assets/stylesheets/genart.css">
    <title>paper cutouts - art - sam webster</title>
</head>

<body>
    <div id="canvas_container" style="position: absolute; z-index: -100; overflow: hidden;"></div>
    <div id="site_container">
        <div id="header" style="background-color: rgba(240, 234, 214, 0.40); backdrop-filter: blur(2px);">
            <div id="top-row" style="padding-bottom: 0; margin-bottom: 0;">
                <div style="margin: 0; padding: 0; width: 25%;">
                    <h1 id="tentwentythree" style="color: #22092C; margin-bottom: 0; padding-bottom: 0;">
                        <b class="link" style="margin: 0; font-weight: bold;" id="home-link">sam webster</b>
                    </h1>
                </div>
                <div
                    style="margin: 0; padding: 0; display: flex; flex-direction: row; justify-content: right; width: 75%">
                    <h1 class="link" id="research-link">research</h1>
                    <h1 style="opacity: 20%;">|</h1>
                    <h1 class="link link-selected" id="genart-link">generative art</h1>
                    <h1 style="opacity: 20%;">|</h1>
                    <h1 class="link" id="about-link">about</h1>
                </div>
            </div>
        </div>

        <div id="control-buttons" style="width: 100%; display:flex; justify-content: right;">
            <button id="reset-button"
                style="font-family: JetBrainsMono; border-color: #22092C; cursor: pointer; background-color: rgba(240, 234, 214, 0.75); backdrop-filter: blur(2px); margin: 0.25em;">&#8635;
                Regenerate</button>
            <button id="return-button"
                style="font-family: JetBrainsMono; border-color: #22092C; cursor: pointer; background-color: rgba(240, 234, 214, 0.75); backdrop-filter: blur(2px); margin: 0.25em;">&#8592;
                Back</button>
        </div>

    </div>

    <script>
        // linking for header elements
        document.getElementById("home-link").addEventListener('click', function () {
            window.location.href = '../../../index.html';
        });
        document.getElementById("research-link").addEventListener('click', function () {
            window.location.href = '../research.html';
        });
        document.getElementById("about-link").addEventListener('click', function () {
            window.location.href = '../about.html';
        });
        document.getElementById("genart-link").addEventListener('click', function () {
            window.location.href = '../genart.html';
        });
        document.getElementById("return-button").addEventListener('click', function () {
            window.location.href = '../genart.html';
        });
    </script>

    <!-- Sketch Scripts -->
    <script src="../../assets/libraries/p5-1.11.10.min.js"></script>
    <script src="../../assets/js/genart/airflow/colors.js"></script>
    <script src="../../assets/js/genart/cutouts/sketch.js"></script>
</body>

</html>
